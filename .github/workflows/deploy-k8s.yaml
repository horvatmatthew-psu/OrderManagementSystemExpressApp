jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Authenticate to Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ vars.GCP_SERVICE_ACCOUNT_KEY }} # Or use Workload Identity

      # Set up GKE credentials
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ordermgmtsystem
          location: us-east1

      # Update Kubernetes Deployment with Docker Hub image
      - name: Deploy
        run: |
          kubectl set image deployment/my-app-deployment \
            my-app-container=docker.io/1025software/ordermgmtexpress:latest
          kubectl rollout status deployment/my-app-deployment
