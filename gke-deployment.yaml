apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-management-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-management-app
  template:
    metadata:
      labels:
        app: order-management-app
    spec:
      containers:
      - name: order-management-app
        image: your-dockerhub-username/ordermgmtexpress:latest
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: sqlite-storage
          mountPath: /src/storage
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-storage
---
apiVersion: v1
kind: Service
metadata:
  name: order-management-service
spec:
  selector:
    app: order-management-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer